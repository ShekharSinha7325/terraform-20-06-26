name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-c0ec3960-c267-466c-877
  REGION: us-central1
  REPOSITORY: app-repo
  IMAGE_NAME: demo-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug app folder
        run: ls -la app

      - name: Debug auth secrets presence
        run: |
          if [ -z "${{ secrets.WIF_PROVIDER }}" ]; then echo "WIF_PROVIDER is EMPTY"; else echo "WIF_PROVIDER is set"; fi
          if [ -z "${{ secrets.SERVICE_ACCOUNT }}" ]; then echo "SERVICE_ACCOUNT is EMPTY"; else echo "SERVICE_ACCOUNT is set"; fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Set Image Variables
        run: |
          echo "IMAGE_URI=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Debug IMAGE_URI
        run: echo "$IMAGE_URI"

      - name: Build Image
        run: |
          docker build -t $IMAGE_URI ./app

      - name: Push Image
        run: |
          docker push $IMAGE_URI

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${IMAGE_NAME} \
            --image $IMAGE_URI \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated
